<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مختصر الروابط والـ QR - ثانوية الأمير عبدالمجيد</title>
    <script type="text/javascript" src="https://unpkg.com/qr-code-styling@1.5.0/lib/qr-code-styling.js"></script>

    <style>
        :root {
            --primary-blue: #0d47a1;
            --matte-red: #ba0000;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f0f2f5;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; margin: 0;
        }
        .container {
            background: white; padding: 2rem; border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            width: 90%; max-width: 450px; text-align: center;
        }
        input {
            width: 100%; padding: 15px; border: 2px solid #e1e4e8;
            border-radius: 12px; margin-bottom: 20px; font-size: 1rem;
            text-align: left; direction: ltr; outline: none;
        }
        .btn {
            background: var(--primary-blue); color: white; border: none;
            padding: 15px; border-radius: 12px; cursor: pointer;
            width: 100%; font-weight: bold; font-size: 1rem;
        }
        #resultArea { margin-top: 20px; display: none; }
        #canvas-holder { 
            background: white; padding: 10px; 
            display: inline-block; border-radius: 15px;
        }
        .signature {
            margin-top: 25px; font-weight: bold; color: var(--matte-red);
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

<div class="container">
    <h2 style="color: #1e293b;">مختصر الروابط والـ QR الذكي</h2>
    <p style="color: #64748b; margin-bottom: 20px;">ثانوية الأمير عبدالمجيد</p>

    <input type="url" id="longUrl" placeholder="ضع الرابط هنا..." required>
    <button class="btn" onclick="generatePremiumQR()">توليد الرمز المدمج</button>

    <div id="resultArea">
        <div id="canvas-holder"></div>
        <div id="shortUrl" style="margin: 15px 0; font-weight: bold; color: #2563eb;"></div>
        <button class="btn" style="background:#10b981; margin-bottom: 10px;" onclick="copyLink()">نسخ الرابط</button>
        <button class="btn" style="background:#4b5563;" onclick="downloadQR()">تحميل الرمز</button>
    </div>

    <div class="signature">
        ✨ أ / عبد العزيز الفيفي - ثانوية الأمير عبدالمجيد 🎓
    </div>
</div>

<script>
    let qrCode;
    // رابط شعار المدرسة المرفوع (تأكد من رفعه في مستودعك باسم logo.png)
    const logoUrl = "https://school1school2-stack.github.io/ABO-TAIF/logo.png";

    async function generatePremiumQR() {
        const urlInput = document.getElementById('longUrl').value;
        if (!urlInput) return alert("فضلاً ضع الرابط أولاً");

        try {
            // استخدام API الاختصار
            const res = await fetch(`https://is.gd/create.php?format=json&url=${encodeURIComponent(urlInput)}`);
            const data = await res.json();
            const shortLink = data.shorturl;

            document.getElementById('shortUrl').innerText = shortLink;
            document.getElementById('resultArea').style.display = 'block';

            // إعدادات الـ QR بالنمط "المودرن" المدمج
            qrCode = new QRCodeStyling({
                width: 300,
                height: 300,
                type: "canvas",
                data: shortLink,
                image: logoUrl, // دمج شعارك هنا
                dotsOptions: {
                    color: "#0d47a1",
                    type: "extra-rounded" // نقاط مستديرة مثل الأمثلة
                },
                backgroundOptions: { color: "#ffffff" },
                imageOptions: {
                    crossOrigin: "anonymous",
                    margin: 5,
                    imageSize: 0.4 // حجم الشعار في المنتصف
                },
                cornersSquareOptions: {
                    type: "extra-rounded",
                    color: "#0d47a1"
                },
                cornersDotOptions: {
                    type: "dot",
                    color: "#0d47a1"
                },
                qrOptions: { errorCorrectionLevel: "H" } // أعلى حماية لضمان القراءة
            });

            const holder = document.getElementById("canvas-holder");
            holder.innerHTML = "";
            qrCode.append(holder);

        } catch (e) {
            alert("حدث خطأ في الاتصال، حاول مرة أخرى");
        }
    }

    function copyLink() {
        navigator.clipboard.writeText(document.getElementById('shortUrl').innerText);
        alert("تم نسخ الرابط!");
    }

    function downloadQR() {
        qrCode.download({ name: "School_QR_AlFaifi", extension: "png" });
    }
</script>

</body>
</html>
