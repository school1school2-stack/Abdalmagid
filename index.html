<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مختصر الروابط - ثانوية الأمير عبدالمجيد</title>
    <script type="text/javascript" src="https://unpkg.com/qr-code-styling@1.5.0/lib/qr-code-styling.js"></script>

    <style>
        :root {
            --main-blue: #0077b5;
            --school-red: #ba0000;
            --bg: #f8fafc;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; margin: 0;
        }

        .container {
            background: white; padding: 2rem; border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            width: 90%; max-width: 400px; text-align: center;
        }

        input {
            width: 100%; padding: 14px; border: 2px solid #e2e8f0;
            border-radius: 12px; margin-bottom: 15px; font-size: 1rem;
            text-align: left; direction: ltr; outline: none;
        }

        .btn {
            background: #1e293b; color: white; border: none;
            padding: 14px; border-radius: 12px; cursor: pointer;
            width: 100%; font-weight: bold; margin-bottom: 10px;
        }

        #qr-container {
            margin: 20px 0;
            background: white;
            padding: 10px;
            display: inline-block;
        }

        .signature {
            margin-top: 20px; font-weight: bold; color: var(--school-red);
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>مختصر الروابط والـ QR</h2>
    <p style="color: #64748b;">ثانوية الأمير عبدالمجيد</p>

    <input type="url" id="longUrl" placeholder="أدخل الرابط هنا..." required>
    <button class="btn" onclick="generateFixedQR()">توليد رمز قابل للقراءة</button>

    <div id="resultArea" style="display:none;">
        <div id="qr-container"></div>
        <div id="shortUrl" style="margin-bottom: 15px; font-weight: bold; color: var(--main-blue);"></div>
        <button class="btn" style="background:#059669;" onclick="copyLink()">نسخ الرابط</button>
        <button class="btn" style="background:#4b5563;" onclick="downloadLink()">تحميل الرمز</button>
    </div>

    <div class="signature">
        ✨ أ / عبد العزيز الفيفي - ثانوية الأمير عبدالمجيد 🎓
    </div>
</div>

<script>
    let qrStyled;

    async function generateFixedQR() {
        const url = document.getElementById('longUrl').value;
        if (!url) return alert("ضع الرابط أولاً");

        try {
            const res = await fetch(`https://is.gd/create.php?format=json&url=${encodeURIComponent(url)}`);
            const data = await res.json();
            const finalUrl = data.shorturl;

            document.getElementById('shortUrl').innerText = finalUrl;
            document.getElementById('resultArea').style.display = 'block';

            qrStyled = new QRCodeStyling({
                width: 300,
                height: 300,
                data: finalUrl,
                // السر هنا: رفع مستوى التصحيح إلى Q لضمان القراءة
                qrOptions: { typeNumber: 0, mode: "Byte", errorCorrectionLevel: "Q" },
                dotsOptions: { color: "#1e293b", type: "rounded" },
                cornersSquareOptions: { type: "extra-rounded", color: "#1e293b" },
                backgroundOptions: { color: "#ffffff" },
                // تقليل حجم النص/الشعار في المركز لكي لا يغطي البيانات
                image: "data:image/svg+xml;charset=utf-8," + encodeURIComponent(`
                    <svg xmlns="http://www.w3.org/2000/svg" width="120" height="40">
                        <rect width="100%" height="100%" fill="white" rx="5"/>
                        <text x="50%" y="50%" dominant-baseline="middle" text-anchor="middle" 
                        font-family="Arial" font-weight="bold" font-size="10" fill="#ba0000">
                            ثانوية الأمير عبدالمجيد
                        </text>
                    </svg>
                `),
                imageOptions: {
                    hideBackgroundDots: true, // إخفاء النقاط خلف النص لزيادة الدقة
                    imageSize: 0.3, // حجم صغير ومناسب (30% من المساحة فقط)
                    margin: 5
                }
            });

            const container = document.getElementById("qr-container");
            container.innerHTML = "";
            qrStyled.append(container);

        } catch (e) { alert("حدث خطأ"); }
    }

    function copyLink() {
        navigator.clipboard.writeText(document.getElementById('shortUrl').innerText);
        alert("تم النسخ");
    }

    function downloadLink() {
        qrStyled.download({ name: "School_QR", extension: "png" });
    }
</script>
</body>
</html>
