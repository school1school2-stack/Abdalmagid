<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مختصر الروابط الاحترافي - ثانوية الأمير عبدالمجيد</title>
    <script type="text/javascript" src="https://unpkg.com/qr-code-styling@1.5.0/lib/qr-code-styling.js"></script>

    <style>
        :root {
            --brand-color: #0077b5; /* يمكنك تغيير اللون هنا (أزرق مثل LinkedIn أو أسود) */
            --bg-color: #f0f2f5;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; margin: 0;
        }

        .container {
            background: white; padding: 2rem; border-radius: 25px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.1);
            width: 90%; max-width: 450px; text-align: center;
        }

        input {
            width: 100%; padding: 15px; border: 2px solid #e1e4e8;
            border-radius: 12px; margin-bottom: 20px; font-size: 1rem;
            text-align: left; direction: ltr; outline: none;
        }

        .btn {
            background: var(--brand-color); color: white; border: none;
            padding: 15px; border-radius: 12px; cursor: pointer;
            width: 100%; font-weight: bold; margin-bottom: 10px; font-size: 1rem;
        }

        .result-area {
            margin-top: 25px; display: none;
            animation: fadeIn 0.5s ease;
        }

        #canvas-container {
            margin-bottom: 20px;
            background: #fff;
            display: inline-block;
            padding: 10px;
            border-radius: 20px;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .signature {
            margin-top: 25px; font-weight: bold; color: #ba0000;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

<div class="container">
    <h2 style="margin-bottom: 5px;">مختصر الروابط الذكي</h2>
    <p style="color: #65676b; margin-bottom: 20px;">ثانوية الأمير عبدالمجيد</p>

    <input type="url" id="longUrl" placeholder="https://example.com/very-long-link" required>
    <button class="btn" onclick="generateQR()">توليد الرمز الاحترافي</button>

    <div id="resultArea" class="result-area">
        <div id="canvas-container"></div>
        <div id="shortUrl" style="margin-bottom: 15px; font-weight: bold; color: var(--brand-color);"></div>
        <button class="btn" style="background:#10b981;" onclick="copyLink()">نسخ الرابط</button>
        <button class="btn" style="background:#333;" onclick="downloadQR()">تحميل الرمز</button>
    </div>

    <div class="signature">
        ✨ أ / عبد العزيز الفيفي - ثانوية الأمير عبدالمجيد 🎓
    </div>
</div>

<script>
    let qrCode;

    async function generateQR() {
        const urlInput = document.getElementById('longUrl').value;
        if (!urlInput) return alert("فضلاً أدخل الرابط");

        try {
            const res = await fetch(`https://is.gd/create.php?format=json&url=${encodeURIComponent(urlInput)}`);
            const data = await res.json();
            const shortLink = data.shorturl;

            document.getElementById('shortUrl').innerText = shortLink;
            document.getElementById('resultArea').style.display = 'block';

            // إنشاء الـ QR بالنمط العصري (LinkedIn Style)
            qrCode = new QRCodeStyling({
                width: 300,
                height: 300,
                type: "svg",
                data: shortLink,
                dotsOptions: {
                    color: "#0077b5", // لون النقاط (أزرق)
                    type: "extra-rounded" // جعل النقاط مستديرة جداً
                },
                backgroundOptions: {
                    color: "#ffffff",
                },
                cornersSquareOptions: {
                    type: "extra-rounded", // الزوايا المربعة تصبح مستديرة
                    color: "#0077b5"
                },
                cornersDotOptions: {
                    type: "dot",
                    color: "#0077b5"
                },
                // إضافة النص في المركز (بدلاً من الصورة نستخدم نصاً مصمماً)
                image: "https://via.placeholder.com/100x100/ffffff/ba0000?text=%D8%A3.%D9%85", // يمكن استبداله بشعار المدرسة لاحقاً
                imageOptions: {
                    crossOrigin: "anonymous",
                    margin: 5,
                    imageSize: 0.4
                }
            });

            const container = document.getElementById("canvas-container");
            container.innerHTML = "";
            qrCode.append(container);

        } catch (e) {
            alert("حدث خطأ في توليد الرابط");
        }
    }

    function copyLink() {
        navigator.clipboard.writeText(document.getElementById('shortUrl').innerText);
        alert("تم النسخ!");
    }

    function downloadQR() {
        qrCode.download({ name: "Prince_Abdulmajeed_QR", extension: "png" });
    }
</script>

</body>
</html>
