<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مختصر الروابط الرسمي - ثانوية الأمير عبدالمجيد</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@700&display=swap" rel="stylesheet">
    <script type="text/javascript" src="https://unpkg.com/qr-code-styling@1.5.0/lib/qr-code-styling.js"></script>

    <style>
        :root {
            --qr-black: #000000;
            --bg-page: #f4f4f9;
        }

        body {
            font-family: 'Amiri', serif;
            background-color: var(--bg-page);
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; margin: 0;
        }

        .container {
            background: white; padding: 2.5rem; border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            width: 95%; max-width: 420px; text-align: center;
        }

        input {
            width: 100%; padding: 14px; border: 2px solid #eee;
            border-radius: 10px; margin-bottom: 15px; font-size: 1.1rem;
            text-align: left; direction: ltr; outline: none; font-family: sans-serif;
        }

        .btn {
            background: var(--qr-black); color: white; border: none;
            padding: 14px; border-radius: 10px; cursor: pointer;
            width: 100%; font-weight: bold; margin-bottom: 10px; font-size: 1.1rem;
        }

        #qr-container {
            margin: 20px 0;
            padding: 10px;
            display: inline-block;
            background: white;
            border: 1px solid #f0f0f0;
            border-radius: 15px;
        }

        .signature {
            margin-top: 25px; font-weight: bold; color: #ba0000;
            font-size: 1rem;
        }
    </style>
</head>
<body>

<div class="container">
    <h2 style="margin-bottom: 5px;">مختصر الروابط والـ QR</h2>
    <p style="color: #666; margin-bottom: 25px;">ثانوية الأمير عبدالمجيد</p>

    <input type="url" id="longUrl" placeholder="https://رابط-الملف-الطويل..." required>
    <button class="btn" onclick="generateOfficialQR()">توليد الرمز الرسمي</button>

    <div id="resultArea" style="display:none;">
        <div id="qr-container"></div>
        <div id="shortUrl" style="margin-bottom: 15px; font-weight: bold; color: #1a73e8; font-family: sans-serif;"></div>
        <button class="btn" style="background:#10b981;" onclick="copyLink()">نسخ الرابط</button>
        <button class="btn" style="background:#333;" onclick="downloadQR()">تحميل الرمز</button>
    </div>

    <div class="signature">
        ✨ أ / عبد العزيز الفيفي - ثانوية الأمير عبدالمجيد 🎓
    </div>
</div>

<script>
    let qrStyled;

    async function generateOfficialQR() {
        const url = document.getElementById('longUrl').value;
        if (!url) return alert("فضلاً ضع الرابط");

        try {
            const res = await fetch(`https://is.gd/create.php?format=json&url=${encodeURIComponent(url)}`);
            const data = await res.json();
            const finalUrl = data.shorturl;

            document.getElementById('shortUrl').innerText = finalUrl;
            document.getElementById('resultArea').style.display = 'block';

            qrStyled = new QRCodeStyling({
                width: 300,
                height: 300,
                data: finalUrl,
                qrOptions: { typeNumber: 0, mode: "Byte", errorCorrectionLevel: "H" },
                dotsOptions: { 
                    color: "#000000", 
                    type: "rounded" // نقاط مستديرة بشكل رزين
                },
                cornersSquareOptions: { type: "extra-rounded", color: "#000000" },
                backgroundOptions: { color: "#ffffff" },
                // دمج اسم المدرسة بخط "أميري" الرسمي
                image: "data:image/svg+xml;charset=utf-8," + encodeURIComponent(`
                    <svg xmlns="http://www.w3.org/2000/svg" width="140" height="50">
                        <rect width="100%" height="100%" fill="white" rx="5"/>
                        <text x="50%" y="50%" dominant-baseline="middle" text-anchor="middle" 
                        font-family="Amiri, serif" font-weight="bold" font-size="14" fill="#000000">
                            ثانوية الأمير عبدالمجيد
                        </text>
                    </svg>
                `),
                imageOptions: {
                    hideBackgroundDots: true,
                    imageSize: 0.4, // حجم متوازن يبرز الخط الرسمي
                    margin: 2
                }
            });

            const container = document.getElementById("qr-container");
            container.innerHTML = "";
            qrStyled.append(container);

        } catch (e) { alert("حدث خطأ في التوليد"); }
    }

    function copyLink() {
        navigator.clipboard.writeText(document.getElementById('shortUrl').innerText);
        alert("تم النسخ");
    }

    function downloadQR() {
        qrStyled.download({ name: "Official_School_QR", extension: "png" });
    }
</script>
</body>
</html>
