<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مختصر الروابط الاحترافي - ثانوية الأمير عبدالمجيد</title>
    <script type="text/javascript" src="https://unpkg.com/qr-code-styling@1.5.0/lib/qr-code-styling.js"></script>

    <style>
        :root {
            --brand-color: #000000; /* الأسود الملكي (يتوافق مع النقاط) */
            --bg-color: #f8fafc;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; margin: 0;
        }

        .container {
            background: white; padding: 2.5rem; border-radius: 25px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            width: 90%; max-width: 420px; text-align: center;
        }

        input {
            width: 100%; padding: 15px; border: 2px solid #e1e4e8;
            border-radius: 12px; margin-bottom: 20px; font-size: 1rem;
            text-align: left; direction: ltr; outline: none;
        }

        .btn {
            background: var(--brand-color); color: white; border: none;
            padding: 15px; border-radius: 12px; cursor: pointer;
            width: 100%; font-weight: bold; margin-bottom: 10px; font-size: 1rem;
        }

        .result-area {
            margin-top: 25px; display: none;
            animation: fadeIn 0.5s ease;
        }

        #qr-holder {
            margin-bottom: 15px;
            display: inline-block;
            background: #fff;
            padding: 10px;
            border-radius: 20px;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .footer-sign {
            margin-top: 25px; font-weight: bold; color: #ba0000;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

<div class="container">
    <h2 style="color: var(--brand-color); margin-bottom: 5px;">مختصر الروابط الذكي</h2>
    <p style="color: #65676b; margin-bottom: 25px;">ثانوية الأمير عبدالمجيد</p>

    <input type="url" id="longUrl" placeholder="https:// example.com / long-link" required>
    <button class="btn" onclick="generateIntegratedQR()">توليد الرمز المنقوش</button>

    <div id="resultArea" class="result-area">
        <div id="qr-holder"></div>
        <div id="shortUrl" style="margin-bottom: 15px; font-weight: bold; color: #2563eb;"></div>
        <button class="btn" style="background:#10b981;" onclick="copyLink()">نسخ الرابط</button>
        <button class="btn" style="background:#333;" onclick="downloadQR()">حفظ صورة الرمز</button>
    </div>

    <div class="footer-sign">
        ✨ أ / عبد العزيز الفيفي - ثانوية الأمير عبدالمجيد 🎓
    </div>
</div>

<script>
    let finalQR;

    async function generateIntegratedQR() {
        const urlInput = document.getElementById('longUrl').value;
        if (!urlInput) return alert("فضلاً ضع الرابط أولاً");

        try {
            // خطوة الاختصار
            const res = await fetch(`https://is.gd/create.php?format=json&url=${encodeURIComponent(urlInput)}`);
            const data = await res.json();
            const shortUrl = data.shorturl;

            document.getElementById('shortUrl').innerText = shortUrl;
            document.getElementById('resultArea').style.display = 'block';

            // إنشاء الـ QR بالنمط المنقوش (Integrated Style)
            finalQR = new QRCodeStyling({
                width: 320,
                height: 320,
                data: shortUrl,
                dotsOptions: {
                    color: "#000000", // لون النقاط (أسود)
                    type: "extra-rounded" // نقاط مستديرة تعطي شعوراً بالنحت
                },
                backgroundOptions: { color: "#ffffff" },
                cornersSquareOptions: {
                    type: "extra-rounded", // زوايا مستديرة
                    color: "#000000"
                },
                cornersDotOptions: { type: "dot", color: "#000000" },
                // دمج اسم المدرسة في المركز برمجياً
                image: "data:image/svg+xml;charset=utf-8," + encodeURIComponent(`
                    <svg xmlns="http://www.w3.org/2000/svg" width="150" height="50">
                        <rect width="100%" height="100%" fill="white" rx="10"/>
                        <text x="50%" y="50%" dominant-baseline="middle" text-anchor="middle" font-family="Arial" font-weight="bold" font-size="12" fill="#ba0000">
                            ثانوية الأمير عبدالمجيد
                        </text>
                    </svg>
                `),
                imageOptions: {
                    crossOrigin: "anonymous",
                    margin: 2,
                    imageSize: 0.4
                }
            });

            const container = document.getElementById("qr-holder");
            container.innerHTML = "";
            finalQR.append(container);

        } catch (e) { alert("حدث خطأ في التوليد"); }
    }

    function copyLink() {
        navigator.clipboard.writeText(document.getElementById('shortUrl').innerText);
        alert("تم النسخ!");
    }

    function downloadQR() {
        finalQR.download({ name: "QR_Prince_Abdulmajeed", extension: "png" });
    }
</script>

</body>
</html>
