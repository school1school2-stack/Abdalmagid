<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مختصر الروابط الرسمي - ثانوية الأمير عبدالمجيد</title>
    <script type="text/javascript" src="https://unpkg.com/qr-code-styling@1.5.0/lib/qr-code-styling.js"></script>

    <style>
        :root {
            --qr-color: #000000; /* اللون الأسود الموحد */
            --bg-page: #f9fbff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-page);
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; margin: 0;
        }

        .container {
            background: white; padding: 2rem; border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            width: 90%; max-width: 400px; text-align: center;
        }

        input {
            width: 100%; padding: 14px; border: 2px solid #e2e8f0;
            border-radius: 12px; margin-bottom: 15px; font-size: 1rem;
            text-align: left; direction: ltr; outline: none;
        }

        .btn {
            background: var(--qr-color); color: white; border: none;
            padding: 14px; border-radius: 12px; cursor: pointer;
            width: 100%; font-weight: bold; margin-bottom: 10px;
        }

        #qr-container {
            margin: 20px 0;
            background: white;
            padding: 10px;
            display: inline-block;
        }

        .signature {
            margin-top: 20px; font-weight: bold; color: #ba0000;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>مختصر الروابط والـ QR</h2>
    <p style="color: #64748b;">ثانوية الأمير عبدالمجيد</p>

    <input type="url" id="longUrl" placeholder="أدخل الرابط الطويل هنا..." required>
    <button class="btn" onclick="generateHarmonizedQR()">توليد الرمز الموحد</button>

    <div id="resultArea" style="display:none;">
        <div id="qr-container"></div>
        <div id="shortUrl" style="margin-bottom: 15px; font-weight: bold; color: #2563eb;"></div>
        <button class="btn" style="background:#10b981;" onclick="copyLink()">نسخ الرابط</button>
        <button class="btn" style="background:#4b5563;" onclick="downloadQR()">تحميل الرمز</button>
    </div>

    <div class="signature">
        ✨ أ / عبد العزيز الفيفي - ثانوية الأمير عبدالمجيد 🎓
    </div>
</div>

<script>
    let qrStyled;

    async function generateHarmonizedQR() {
        const url = document.getElementById('longUrl').value;
        if (!url) return alert("فضلاً ضع الرابط");

        try {
            const res = await fetch(`https://is.gd/create.php?format=json&url=${encodeURIComponent(url)}`);
            const data = await res.json();
            const finalUrl = data.shorturl;

            document.getElementById('shortUrl').innerText = finalUrl;
            document.getElementById('resultArea').style.display = 'block';

            qrStyled = new QRCodeStyling({
                width: 300,
                height: 300,
                data: finalUrl,
                qrOptions: { typeNumber: 0, mode: "Byte", errorCorrectionLevel: "H" },
                dotsOptions: { 
                    color: "#000000", 
                    type: "extra-rounded" // جعل النقاط مستديرة لزيادة التناسق
                },
                cornersSquareOptions: { type: "extra-rounded", color: "#000000" },
                cornersDotOptions: { type: "dot", color: "#000000" },
                backgroundOptions: { color: "#ffffff" },
                // دمج اسم المدرسة باللون الأسود في المركز
                image: "data:image/svg+xml;charset=utf-8," + encodeURIComponent(`
                    <svg xmlns="http://www.w3.org/2000/svg" width="130" height="45">
                        <rect width="100%" height="100%" fill="white" rx="8"/>
                        <text x="50%" y="50%" dominant-baseline="middle" text-anchor="middle" 
                        font-family="Tahoma, Arial" font-weight="bold" font-size="11" fill="#000000">
                            ثانوية الأمير عبدالمجيد
                        </text>
                    </svg>
                `),
                imageOptions: {
                    hideBackgroundDots: true,
                    imageSize: 0.35, // حجم متوازن للقراءة والشكل
                    margin: 4
                }
            });

            const container = document.getElementById("qr-container");
            container.innerHTML = "";
            qrStyled.append(container);

        } catch (e) { alert("حدث خطأ في التوليد"); }
    }

    function copyLink() {
        navigator.clipboard.writeText(document.getElementById('shortUrl').innerText);
        alert("تم النسخ بنجاح");
    }

    function downloadQR() {
        qrStyled.download({ name: "School_QR_Harmonized", extension: "png" });
    }
</script>
</body>
</html>
