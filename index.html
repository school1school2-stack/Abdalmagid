<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مختصر الروابط الرسمي - ثانوية الأمير عبدالمجيد</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;700&display=swap" rel="stylesheet">
    <script type="text/javascript" src="https://unpkg.com/qr-code-styling@1.5.0/lib/qr-code-styling.js"></script>

    <style>
        :root {
            --qr-color: #000000; /* الأسود الكامل للدمج */
            --bg-page: #f9fafb;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background-color: var(--bg-page);
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; margin: 0;
        }

        .container {
            background: white; padding: 2.5rem; border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            width: 90%; max-width: 400px; text-align: center;
        }

        input {
            width: 100%; padding: 14px; border: 2px solid #e5e7eb;
            border-radius: 10px; margin-bottom: 15px; font-size: 1rem;
            text-align: left; direction: ltr; outline: none; font-family: sans-serif;
        }

        .btn {
            background: var(--qr-color); color: white; border: none;
            padding: 14px; border-radius: 10px; cursor: pointer;
            width: 100%; font-weight: bold; margin-bottom: 10px; font-size: 1rem;
        }

        #qr-container {
            margin: 20px 0;
            padding: 10px;
            display: inline-block;
            background: white;
            border: 1px solid #eee;
            border-radius: 15px;
        }

        .signature {
            margin-top: 25px; font-weight: bold; color: #ba0000;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

<div class="container">
    <h2 style="margin-bottom: 5px;">مختصر الروابط الذكي</h2>
    <p style="color: #6b7280; margin-bottom: 25px;">ثانوية الأمير عبدالمجيد</p>

    <input type="url" id="longUrl" placeholder="أدخل الرابط الطويل هنا..." required>
    <button class="btn" onclick="generateEngravedQR()">توليد الرمز المدمج (نقش خفي)</button>

    <div id="resultArea" style="display:none;">
        <div id="qr-container"></div>
        <div id="shortUrl" style="margin-bottom: 15px; font-weight: bold; color: #2563eb; font-family: sans-serif; font-size:0.9rem;"></div>
        <button class="btn" style="background:#059669;" onclick="copyLink()">نسخ الرابط</button>
        <button class="btn" style="background:#4b5563;" onclick="downloadQR()">تحميل الرمز</button>
    </div>

    <div class="signature">
        ✨ أ / عبد العزيز الفيفي - ثانوية الأمير عبدالمجيد 🎓
    </div>
</div>

<script>
    let qrStyled;

    async function generateEngravedQR() {
        const url = document.getElementById('longUrl').value;
        if (!url) return alert("فضلاً ضع الرابط");

        try {
            const res = await fetch(`https://is.gd/create.php?format=json&url=${encodeURIComponent(url)}`);
            const data = await res.json();
            const finalUrl = data.shorturl;

            document.getElementById('shortUrl').innerText = finalUrl;
            document.getElementById('resultArea').style.display = 'block';

            qrStyled = new QRCodeStyling({
                width: 320,
                height: 320,
                data: finalUrl,
                qrOptions: { typeNumber: 0, mode: "Byte", errorCorrectionLevel: "H" },
                dotsOptions: { 
                    color: "#000000", 
                    type: "rounded" // نقاط مستديرة رزينة تليق بالنقش
                },
                cornersSquareOptions: { type: "extra-rounded", color: "#000000" },
                cornersDotOptions: { type: "dot", color: "#000000" },
                backgroundOptions: { color: "#ffffff" },
                // سر النقش الخفي: دمج النص مباشرة بدون خلفية بيضاء
                image: "data:image/svg+xml;charset=utf-8," + encodeURIComponent(`
                    <svg xmlns="http://www.w3.org/2000/svg" width="160" height="50">
                        <text x="50%" y="50%" dominant-baseline="middle" text-anchor="middle" 
                        font-family="'Cairo', sans-serif" font-weight="700" font-size="11" fill="#000000">
                            ثانوية الأمير عبدالمجيد
                        </text>
                    </svg>
                `),
                imageOptions: {
                    hideBackgroundDots: true, // إخفاء النقاط الخلفية لزيادة وضوح الحروف عند التركيز
                    imageSize: 0.45, // حجم متوازن يسمح للماسح بالعمل وللعين بالتركيز
                    margin: 0 // تداخل مباشر مع النقش
                }
            });

            const container = document.getElementById("qr-container");
            container.innerHTML = "";
            qrStyled.append(container);

        } catch (e) { alert("حدث خطأ في التوليد"); }
    }

    function copyLink() {
        navigator.clipboard.writeText(document.getElementById('shortUrl').innerText);
        alert("تم النسخ بنجاح");
    }

    function downloadQR() {
        qrStyled.download({ name: "Official_School_QR_Engraved", extension: "png" });
    }
</script>
</body>
</html>
