<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مختصر الروابط - ثانوية الأمير عبدالمجيد</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

    <style>
        :root {
            --primary-color: #2563eb;
            --matte-red: #ba0000;
            --bg-color: #f1f5f9;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            background: white;
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            width: 90%;
            max-width: 450px;
            text-align: center;
        }

        input {
            width: 100%;
            padding: 14px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            box-sizing: border-box;
            margin-bottom: 1rem;
            text-align: left;
            direction: ltr;
        }

        .btn {
            color: white;
            border: none;
            padding: 12px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1rem;
            width: 100%;
            margin-bottom: 8px;
            font-weight: bold;
        }

        .btn-primary { background-color: var(--primary-color); }
        .btn-download { background-color: #334155; }

        .result-area {
            margin-top: 1.5rem;
            padding: 20px;
            border-radius: 15px;
            background: #ffffff;
            border: 1px solid #e2e8f0;
            display: none;
        }

        /* حاوية الـ QR مع اسم المدرسة */
        #qr-export-container {
            background: white;
            padding: 15px;
            display: inline-block;
            border: 1px solid #eee;
            margin-bottom: 15px;
        }

        .school-label {
            display: block;
            font-size: 14px;
            font-weight: bold;
            color: var(--matte-red);
            margin-bottom: 8px;
        }

        .signature {
            margin-top: 2rem;
            color: var(--matte-red);
            font-weight: bold;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

<div class="container">
    <h2 style="color: #1e293b; margin-bottom: 5px;">مختصر الروابط الذكي</h2>
    <p style="font-size: 0.9rem; color: #64748b; margin-bottom: 20px;">ثانوية الأمير عبدالمجيد</p>

    <input type="url" id="longUrl" placeholder="أدخل الرابط الطويل هنا..." required>
    <button class="btn btn-primary" onclick="shortenUrl()">توليد الرابط والرمز</button>

    <div id="resultArea" class="result-area">
        <div id="qr-export-container">
            <span class="school-label">ثانوية الأمير عبدالمجيد</span>
            <div id="qrcode"></div>
        </div>
        
        <div id="shortUrl" style="font-weight:bold; color:var(--primary-color); margin-bottom:15px; font-size: 0.9rem;"></div>
        
        <button class="btn btn-download" onclick="downloadQR()">حفظ الرمز باسم المدرسة</button>
    </div>

    <div class="signature">
        ✨ أ / عبد العزيز الفيفي - ثانوية الأمير عبدالمجيد 🎓
    </div>
</div>

<script>
    let qrContainer = new QRCode(document.getElementById("qrcode"), {
        width: 180,
        height: 180,
        colorDark : "#000000",
        colorLight : "#ffffff",
        correctLevel : QRCode.CorrectLevel.H
    });

    async function shortenUrl() {
        const longUrl = document.getElementById('longUrl').value;
        const resultArea = document.getElementById('resultArea');
        const shortUrlDiv = document.getElementById('shortUrl');

        if (!longUrl) {
            alert("يرجى إدخال رابط");
            return;
        }

        try {
            const response = await fetch(`https://is.gd/create.php?format=json&url=${encodeURIComponent(longUrl)}`);
            const data = await response.json();

            if (data.shorturl) {
                shortUrlDiv.innerText = data.shorturl;
                resultArea.style.display = 'block';
                
                qrContainer.clear();
                qrContainer.makeCode(data.shorturl);
            }
        } catch (error) {
            alert("حدث خطأ في الاتصال");
        }
    }

    function downloadQR() {
        const canvas = document.querySelector('#qrcode canvas');
        const finalCanvas = document.createElement('canvas');
        const ctx = finalCanvas.getContext('2d');

        // إعداد أبعاد اللوحة الجديدة لتشمل النص
        finalCanvas.width = canvas.width + 40;
        finalCanvas.height = canvas.height + 80;

        // خلفية بيضاء
        ctx.fillStyle = "white";
        ctx.fillRect(0, 0, finalCanvas.width, finalCanvas.height);

        // إضافة نص "ثانوية الأمير عبدالمجيد"
        ctx.fillStyle = "#ba0000"; // أحمر مطفي
        ctx.font = "bold 18px Tahoma";
        ctx.textAlign = "center";
        ctx.fillText("ثانوية الأمير عبدالمجيد", finalCanvas.width / 2, 35);

        // رسم الـ QR Code
        ctx.drawImage(canvas, 20, 50);

        // تحميل الصورة
        const link = document.createElement('a');
        link.href = finalCanvas.toDataURL("image/png");
        link.download = 'ثانوية_الأمير_عبدالمجيد_QR.png';
        link.click();
    }
</script>

</body>
</html>
