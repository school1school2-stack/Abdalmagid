<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مختصر الروابط الرسمي - ثانوية الأمير عبدالمجيد</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

    <style>
        :root {
            --primary-color: #1a1a1a;
            --school-red: #ba0000;
            --bg-color: #f4f7f6;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; margin: 0;
        }

        .container {
            background: white;
            padding: 2.5rem;
            border-radius: 25px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            width: 90%; max-width: 450px; text-align: center;
        }

        input {
            width: 100%; padding: 15px; border: 2px solid #eee;
            border-radius: 12px; margin-bottom: 15px; font-size: 1rem;
            text-align: left; direction: ltr;
        }

        .btn {
            background: var(--primary-color); color: white; border: none;
            padding: 15px; border-radius: 12px; cursor: pointer;
            width: 100%; font-weight: bold; margin-bottom: 10px;
        }

        .result-area {
            margin-top: 20px; padding: 15px; border-radius: 15px;
            background: #fff; border: 1px dashed #ccc; display: none;
        }

        #canvas-container { margin: 20px 0; position: relative; }

        .signature {
            margin-top: 25px; font-weight: bold; color: var(--school-red);
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

<div class="container">
    <h2 style="margin-bottom: 10px;">مختصر الروابط الرسمي</h2>
    <p style="color: #666; margin-bottom: 25px;">ثانوية الأمير عبدالمجيد</p>

    <input type="url" id="longUrl" placeholder="أدخل الرابط الطويل هنا..." required>
    <button class="btn" onclick="generateSmartQR()">توليد الرمز المدمج</button>

    <div id="resultArea" class="result-area">
        <div id="canvas-container">
            <canvas id="qrCanvas"></canvas>
        </div>
        <div id="shortUrl" style="margin-bottom: 15px; font-size: 0.8rem; color: #2563eb; font-weight: bold;"></div>
        <button class="btn" style="background:#10b981;" onclick="copyLink()">نسخ الرابط المختصر</button>
        <button class="btn" style="background:#4b5563;" onclick="downloadQR()">حفظ صورة الرمز</button>
    </div>

    <div class="signature">
        ✨ أ / عبد العزيز الفيفي - ثانوية الأمير عبدالمجيد 🎓
    </div>
</div>

<div id="temp-qrcode" style="display:none;"></div>

<script>
    async function generateSmartQR() {
        const longUrl = document.getElementById('longUrl').value;
        const shortUrlDiv = document.getElementById('shortUrl');
        
        if (!longUrl) return alert("فضلاً ضع الرابط أولاً");

        try {
            const response = await fetch(`https://is.gd/create.php?format=json&url=${encodeURIComponent(longUrl)}`);
            const data = await response.json();
            
            if (data.shorturl) {
                shortUrlDiv.innerText = data.shorturl;
                renderQR(data.shorturl);
                document.getElementById('resultArea').style.display = 'block';
            }
        } catch (e) { alert("خطأ في الاتصال"); }
    }

    function renderQR(text) {
        const tempDiv = document.getElementById('temp-qrcode');
        tempDiv.innerHTML = "";
        
        // توليد QR بمستوى تصحيح عالي (H) للسماح بوضع نص في المركز
        new QRCode(tempDiv, {
            text: text,
            width: 300,
            height: 300,
            colorDark: "#000000",
            colorLight: "#ffffff",
            correctLevel: QRCode.CorrectLevel.H
        });

        // انتظر التوليد ثم ارسم على الـ Canvas
        setTimeout(() => {
            const qrImg = tempDiv.querySelector('img');
            const canvas = document.getElementById('qrCanvas');
            const ctx = canvas.getContext('2d');
            
            canvas.width = 350;
            canvas.height = 350;

            // خلفية بيضاء
            ctx.fillStyle = "white";
            ctx.fillRect(0,0,350,350);

            // رسم الـ QR
            ctx.drawImage(qrImg, 25, 25, 300, 300);

            // إعداد مربع المركز (دمج اسم المدرسة)
            const boxSize = 100;
            const x = (350 - boxSize) / 2;
            const y = (350 - boxSize) / 2;

            ctx.fillStyle = "white";
            ctx.fillRect(x, y, boxSize, 40); // خلفية للنص في المركز

            ctx.fillStyle = "#ba0000"; // أحمر مطفي
            ctx.font = "bold 14px Tahoma";
            ctx.textAlign = "center";
            ctx.fillText("ثانوية", 350/2, y + 15);
            ctx.fillText("الأمير عبدالمجيد", 350/2, y + 33);
        }, 100);
    }

    function copyLink() {
        navigator.clipboard.writeText(document.getElementById('shortUrl').innerText);
        alert("تم النسخ!");
    }

    function downloadQR() {
        const link = document.createElement('a');
        link.download = 'QR_Prince_Abdulmajeed.png';
        link.href = document.getElementById('qrCanvas').toDataURL();
        link.click();
    }
</script>

</body>
</html>
