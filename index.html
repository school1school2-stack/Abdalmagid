<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مختصر الروابط - ثانوية الأمير عبدالمجيد</title>
    <script type="text/javascript" src="https://unpkg.com/qr-code-styling@1.5.0/lib/qr-code-styling.js"></script>

    <style>
        :root {
            --main-color: #1e293b; /* لون أسود ملكي متناسق */
            --school-red: #ba0000;
            --bg-page: #fdfdfd;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-page);
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; margin: 0;
        }

        .container {
            background: white; padding: 2.5rem; border-radius: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.05);
            width: 90%; max-width: 450px; text-align: center;
            border: 1px solid #f0f0f0;
        }

        input {
            width: 100%; padding: 15px; border: 2px solid #f1f5f9;
            border-radius: 12px; margin-bottom: 20px; font-size: 1rem;
            text-align: left; direction: ltr; outline: none;
        }

        .btn {
            background: var(--main-color); color: white; border: none;
            padding: 15px; border-radius: 12px; cursor: pointer;
            width: 100%; font-weight: bold; margin-bottom: 10px; font-size: 1rem;
        }

        .result-area {
            margin-top: 25px; display: none;
            animation: fadeIn 0.4s ease-in-out;
        }

        #qr-holder {
            margin: 15px 0;
            display: inline-block;
            background: #fff;
            padding: 10px;
            border-radius: 20px;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .footer-sig {
            margin-top: 25px; font-weight: bold; color: var(--school-red);
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

<div class="container">
    <h2 style="color: var(--main-color); margin-bottom: 5px;">مختصر الروابط الذكي</h2>
    <p style="color: #94a3b8; font-size: 0.9rem; margin-bottom: 25px;">ثانوية الأمير عبدالمجيد</p>

    <input type="url" id="longUrl" placeholder="https://رابط-الملف-الطويل..." required>
    <button class="btn" onclick="buildAdvancedQR()">توليد الرمز المدمج</button>

    <div id="resultArea" class="result-area">
        <div id="qr-holder"></div>
        <div id="shortUrlDisplay" style="margin-bottom: 15px; font-weight: bold; color: #2563eb; font-size: 0.85rem;"></div>
        
        <button class="btn" style="background:#059669;" onclick="copyResult()">نسخ الرابط</button>
        <button class="btn" style="background:#475569;" onclick="saveQR()">تحميل الرمز (PNG)</button>
    </div>

    <div class="footer-sig">
        ✨ أ / عبد العزيز الفيفي - ثانوية الأمير عبدالمجيد 🎓
    </div>
</div>

<script>
    let finalQR;

    async function buildAdvancedQR() {
        const inputUrl = document.getElementById('longUrl').value;
        if (!inputUrl) return alert("يرجى وضع الرابط أولاً");

        try {
            // خطوة الاختصار
            const res = await fetch(`https://is.gd/create.php?format=json&url=${encodeURIComponent(inputUrl)}`);
            const data = await res.json();
            const shortUrl = data.shorturl;

            document.getElementById('shortUrlDisplay').innerText = shortUrl;
            document.getElementById('resultArea').style.display = 'block';

            // بناء الـ QR بتصميم مدمج (متوافق مع الهوية الرسمية)
            finalQR = new QRCodeStyling({
                width: 300,
                height: 300,
                data: shortUrl,
                dotsOptions: {
                    color: "#1e293b", // لون النقاط (أسود احترافي)
                    type: "extra-rounded" // نقاط مستديرة عصرية
                },
                backgroundOptions: { color: "#ffffff" },
                cornersSquareOptions: {
                    type: "extra-rounded", // زوايا مستديرة
                    color: "#1e293b"
                },
                cornersDotOptions: { type: "dot", color: "#1e293b" },
                // دمج اسم المدرسة في المركز برمجياً كصورة نصية
                image: "data:image/svg+xml;charset=utf-8," + encodeURIComponent(`
                    <svg xmlns="http://www.w3.org/2000/svg" width="150" height="50">
                        <rect width="100%" height="100%" fill="white" rx="10"/>
                        <text x="50%" y="50%" dominant-baseline="middle" text-anchor="middle" 
                        font-family="Tahoma, sans-serif" font-weight="bold" font-size="12" fill="#ba0000">
                            ثانوية الأمير عبدالمجيد
                        </text>
                    </svg>
                `),
                imageOptions: {
                    crossOrigin: "anonymous",
                    margin: 2,
                    imageSize: 0.5
                }
            });

            const container = document.getElementById("qr-holder");
            container.innerHTML = "";
            finalQR.append(container);

        } catch (e) {
            alert("حدث خطأ، تأكد من اتصال الإنترنت");
        }
    }

    function copyResult() {
        navigator.clipboard.writeText(document.getElementById('shortUrlDisplay').innerText);
        alert("تم النسخ بنجاح");
    }

    function saveQR() {
        finalQR.download({ name: "QR_Prince_Abdulmajeed", extension: "png" });
    }
</script>

</body>
</html>
