<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مختصر الروابط الرسمي - ثانوية الأمير عبدالمجيد</title>
    <script type="text/javascript" src="https://unpkg.com/qr-code-styling@1.5.0/lib/qr-code-styling.js"></script>

    <style>
        :root {
            --brand-color: #0077b5; /* لون النقاط المنقوشة (أزرق ملكي) */
            --text-color: #ba0000; /* لون اسم المدرسة عند الحفظ (أحمر مطفي) */
            --bg-color: #f1f5f9;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; margin: 0;
        }

        .container {
            background: white; padding: 2.5rem; border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            width: 90%; max-width: 450px; text-align: center;
        }

        input {
            width: 100%; padding: 14px; border: 2px solid #e2e8f0;
            border-radius: 10px; margin-bottom: 1rem; font-size: 1rem;
            text-align: left; direction: ltr;
        }

        .btn {
            background: var(--brand-color); color: white; border: none;
            padding: 14px; border-radius: 10px; cursor: pointer;
            width: 100%; font-weight: bold; margin-bottom: 8px; font-size: 1rem;
        }

        .result-area {
            margin-top: 1.5rem; display: none;
            animation: fadeIn 0.5s ease;
        }

        #qr-container {
            margin: 20px 0;
            background: #fff;
            display: inline-block;
            padding: 10px;
            border-radius: 20px;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .signature {
            margin-top: 2rem; color: var(--text-color); font-weight: bold;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

<div class="container">
    <h2 style="margin-bottom: 5px;">مختصر الروابط والـ QR</h2>
    <p style="color: #64748b; margin-bottom: 25px;">ثانوية الأمير عبدالمجيد</p>

    <input type="url" id="longUrl" placeholder="https://رابط-الملف-الطويل..." required>
    <button class="btn" onclick="generateEngravedQR()">توليد الرمز المنقوش</button>

    <div id="resultArea" class="result-area">
        <div id="qr-container"></div>
        <div id="shortUrl" style="margin-bottom: 15px; font-weight: bold; color: var(--brand-color); font-size: 0.9rem;"></div>
        <button class="btn" style="background:#10b981;" onclick="copyLink()">نسخ الرابط</button>
        <button class="btn" style="background:#333;" onclick="downloadQR()">تحميل الرمز المنقوش</button>
    </div>

    <div class="signature">
        ✨ أ / عبد العزيز الفيفي - ثانوية الأمير عبدالمجيد 🎓
    </div>
</div>

<script>
    let qrCode;

    async function generateEngravedQR() {
        const inputUrl = document.getElementById('longUrl').value;
        if (!inputUrl) return alert("فضلاً أدخل الرابط");

        try {
            // خطوة الاختصار
            const res = await fetch(`https://is.gd/create.php?format=json&url=${encodeURIComponent(inputUrl)}`);
            const data = await res.json();
            const shortUrl = data.shorturl;

            document.getElementById('shortUrl').innerText = shortUrl;
            document.getElementById('resultArea').style.display = 'block';

            // إنشاء الـ QR بالنمط المنقوش (Engraved Style)
            qrCode = new QRCodeStyling({
                width: 320,
                height: 320,
                data: shortUrl,
                dotsOptions: {
                    color: "#0077b5", // لون النقاط
                    type: "extra-rounded" // نقاط مستديرة تعطي شعوراً بالنحت
                },
                backgroundOptions: {
                    color: "#ffffff",
                },
                cornersSquareOptions: {
                    type: "extra-rounded", // زوايا مستديرة
                    color: "#0077b5"
                },
                cornersDotOptions: {
                    type: "dot",
                    color: "#0077b5"
                },
                // إضافة اسم المدرسة في المركز برمجياً
                image: "data:image/svg+xml;charset=utf-8," + encodeURIComponent(`
                    <svg xmlns="http://www.w3.org/2000/svg" width="150" height="50">
                        <rect width="100%" height="100%" fill="white" rx="10"/>
                        <text x="50%" y="50%" dominant-baseline="middle" text-anchor="middle" font-family="Arial" font-weight="bold" font-size="12" fill="#ba0000">
                            ثانوية الأمير عبدالمجيد
                        </text>
                    </svg>
                `),
                imageOptions: {
                    crossOrigin: "anonymous",
                    margin: 2,
                    imageSize: 0.4
                }
            });

            const container = document.getElementById("qr-container");
            container.innerHTML = "";
            qrCode.append(container);

        } catch (e) {
            alert("حدث خطأ، تأكد من اتصال الإنترنت");
        }
    }

    function copyLink() {
        navigator.clipboard.writeText(document.getElementById('shortUrl').innerText);
        alert("تم النسخ بنجاح");
    }

    function downloadQR() {
        qrCode.download({ name: "QR_Prince_Abdulmajeed", extension: "png" });
    }
</script>

</body>
</html>
